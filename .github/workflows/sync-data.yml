name: Sync NYC Violations Data

on:
  schedule:
    - cron: '0 */6 * * *'  # Every 6 hours (00:00, 06:00, 12:00, 18:00 UTC)
  workflow_dispatch:  # Manual trigger from GitHub Actions page

permissions:
  contents: write  # allow the job to push the auto-synced data back

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Fetch ECB violations from NYC Open Data
        run: python api_fetcher.py --days 365

      - name: Fetch HPD violations from NYC Open Data
        run: python hpd_api_fetcher.py --days 365

      - name: Regenerate data snapshot
        run: python webapp/generate_data.py

      - name: Commit and push changes
        run: |
          git config user.name "PropFolio Data Sync"
          git config user.email "noreply@github.com"
          git add violations_found.csv hpd_found.csv webapp/data.js
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto-sync: Update violations and HPD data from NYC Open Data"
            # Rebase onto any commits that landed while the job ran, then push
            # (retry once) so a race doesn't fail the whole run.
            git pull --rebase origin main || true
            git push || (git pull --rebase origin main && git push)
          fi
